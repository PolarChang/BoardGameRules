<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Game Rules RAG 引擎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 24px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-controls select {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .header-controls select option {
            background: #1a1a2e;
            color: white;
        }

        .header-controls label {
            font-size: 13px;
            opacity: 0.8;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-container:empty::after {
            content: '輸入問題來查詢桌遊規則...';
            display: block;
            text-align: center;
            color: #999;
            font-size: 16px;
            margin-top: 60px;
        }

        /* Message Bubbles */
        .message {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.bot {
            align-items: flex-start;
        }

        .message .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            max-width: 85%;
        }

        .message.user .bubble {
            background: #0f3460;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: white;
            color: #1a1a2e;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 100%;
        }

        .message .label {
            font-size: 12px;
            color: #888;
            margin: 4px 12px;
        }

        /* Result Cards */
        .result-card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .result-card:last-child {
            margin-bottom: 0;
        }

        .result-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .result-card .rank {
            font-weight: 600;
            color: #0f3460;
        }

        .result-card .score {
            background: #e8f4fd;
            color: #0f3460;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .result-card .content {
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .result-card .content::first-line {
            font-weight: 500;
            color: #1a1a2e;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .error-msg {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #cc0000;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 14px;
        }

        /* Input Area */
        .input-area {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 16px 24px;
            flex-shrink: 0;
        }

        .input-area .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #0f3460;
        }

        .input-area button {
            background: #0f3460;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .input-area button:hover {
            background: #16213e;
        }

        .input-area button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #0f3460;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 12px 16px;
            }
            .header-controls {
                width: 100%;
                justify-content: flex-end;
            }
            .chat-container {
                padding: 12px;
            }
            .input-area {
                padding: 12px 16px;
            }
            .message .bubble {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1><span>🎲</span> Board Game Rules RAG 引擎</h1>
        <div class="header-controls">
            <label for="game-select">🎯 遊戲篩選</label>
            <select id="game-select">
                <option value="">所有遊戲</option>
            </select>
        </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-container" id="chat-container">
        <div class="message bot">
            <div class="bubble" style="background:#e8f4fd; text-align:center;">
                👋 歡迎使用 Board Game Rules 查詢引擎！<br>
                輸入任何關於桌遊規則的問題，我會從規則書中找出相關段落。<br>
                💡 提示：回答內容以繁體中文顯示。
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <input
                type="text"
                id="query-input"
                placeholder="輸入問題，例如：遊戲結束計分方式是什麼？"
                autofocus
            />
            <button id="send-btn">送出</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const gameSelect = document.getElementById('game-select');

        // ── Load available games on startup ──
        async function loadGames() {
            try {
                const res = await fetch('/api/games');
                const data = await res.json();
                data.games.forEach(game => {
                    const opt = document.createElement('option');
                    opt.value = game;
                    // Clean up filename display
                    const display = game
                        .replace(/_/g, ' ')
                        .replace(/\.pdf$/i, '')
                        .replace(/-/g, ' ');
                    opt.textContent = display;
                    gameSelect.appendChild(opt);
                });
            } catch (e) {
            console.warn('載入遊戲清單失敗:', e);
            }
        }
        loadGames();

        // ── Send query ──
        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query) return;

            const game = gameSelect.value;

            // Add user message
            addUserMessage(query);
            queryInput.value = '';
            queryInput.disabled = true;
            sendBtn.disabled = true;

            // Add loading indicator
            const loadingMsg = addBotLoading();

            try {
                const res = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, game, top_k: 5 }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || `HTTP ${res.status}`);
                }

                const data = await res.json();
                removeMessage(loadingMsg);

                if (data.results.length === 0) {
                    addBotMessage('❌ 找不到相關規則段落。請嘗試不同的關鍵字。');
                } else {
                    addBotResults(query, data.results);
                }
            } catch (e) {
                removeMessage(loadingMsg);
                addBotError(`查詢失敗：${e.message}`);
            } finally {
                queryInput.disabled = false;
                sendBtn.disabled = false;
                queryInput.focus();
            }
        }

        // ── UI Helpers ──
        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `<div class="label">你</div><div class="bubble">${escapeHtml(text)}</div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function addBotMessage(text) {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `<div class="label">🎲 引擎</div><div class="bubble">${text}</div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function addBotResults(query, results) {
            const cardsHtml = results.map(r => `
                <div class="result-card">
                    <div class="meta">
                        <span class="rank">#${r.rank}</span>
                        <span class="score">相關度：${r.score}</span>
                    </div>
                    <div class="content">${escapeHtml(r.content)}</div>
                </div>
            `).join('');

            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `
                <div class="label">🎲 引擎</div>
                <div class="bubble">
                    <div style="margin-bottom:10px;font-weight:500;color:#0f3460;">
                        📖 找到 ${results.length} 個相關段落：
                    </div>
                    ${cardsHtml}
                </div>
            `;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function addBotLoading() {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.id = 'loading-msg';
            div.innerHTML = `<div class="label">🎲 引擎</div><div class="bubble"><div class="loading"></div> 搜尋中...</div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
            return div;
        }

        function addBotError(msg) {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `<div class="label">🎲 引擎</div><div class="error-msg">❌ ${escapeHtml(msg)}</div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function removeMessage(el) {
            if (el && el.parentNode) el.parentNode.removeChild(el);
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ── Events ──
        sendBtn.addEventListener('click', sendQuery);
        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendQuery();
        });
    </script>
</body>
</html>
